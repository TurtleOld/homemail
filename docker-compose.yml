services:
  webmail:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homemail-webclient-dev
    restart: unless-stopped
    command: >
      sh -c "npm run auto-sort && npm start"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MAIL_PROVIDER=stalwart
      - STALWART_BASE_URL=http://stalwart:8080
      - STALWART_SMTP_HOST=stalwart
      - STALWART_SMTP_PORT=587
      - STALWART_SMTP_SECURE=false
      - STALWART_AUTH_MODE=basic
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - homemail-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  stalwart:
    image: stalwartlabs/stalwart:v0.15.3@sha256:8c977e1dc736f0078179074aa97f46aca6b387692fec09352cf160e9f5010c9c
    container_name: homemail-stalwart-dev
    restart: unless-stopped
    ports:
      - '1025:25'
      - '1143:143'
      - '9080:8080'
      - '1587:587'
      - '1993:993'
    volumes:
      - stalwart-data:/opt/stalwart-mail
      - ./config/stalwart/config.toml:/opt/stalwart-mail/etc/config.toml:ro
    networks:
      - homemail-network
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/.well-known/jmap || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:stable-alpine
    container_name: homemail-nginx-dev
    restart: unless-stopped
    ports:
      - '1080:80'
      - '1443:443'
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      webmail:
        condition: service_healthy
    networks:
      - homemail-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  stalwart-data:
    driver: local

networks:
  homemail-network:
    driver: bridge
